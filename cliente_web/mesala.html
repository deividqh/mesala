  <style>
    /*
      Sistema tipográfico unificado para Mesala
      - Alcance limitado a esta página (body[data-page="mesala"])
      - Mantiene KISS: variables + reglas simples y predecibles
    */
    body[data-page="mesala"] {
      --mesala-font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
      --mesala-font-size: 0.95rem;
      --mesala-text-color: #334155;
      --mesala-text-transform: none;
      --mesala-letter-spacing: 0.01em;
      --mesala-word-spacing: 0.01em;
      --mesala-object-gap: 0.75rem;
    }

    body[data-page="mesala"],
    body[data-page="mesala"] :where(
      h1, h2, h3, h4, h5, h6,
      p, span, small, strong, em,
      label, legend,
      input, textarea, select, option,
      button, a,
      .offcanvas-title, .modal-title,
      .accordion-button, .alert, .config-info,
      [data-creat], [data-rud], [data-updt], [data-config]
    ) {
      font-family: var(--mesala-font-family);
      font-size: var(--mesala-font-size);
      color: var(--mesala-text-color);
      text-transform: var(--mesala-text-transform);
      letter-spacing: var(--mesala-letter-spacing);
      word-spacing: var(--mesala-word-spacing);
    }

    body[data-page="mesala"] :where(
      .navbar-groups,
      .navbar-left,
      .navbar-elementos,
      .navbar-actions-group,
      .options-bar__group,
      .social-icons-container,
      .photo-actions-section,
      .d-flex.gap-2
    ) {
      gap: var(--mesala-object-gap);
    }
  </style>

                </div>
              </div>
              <div class="accordion-item">
                <h3 class="accordion-header">
                  <button class="accordion-button collapsed " type="button" data-bs-toggle="collapse" data-bs-target="#acordeon_mensajes" aria-expanded="false" aria-controls="acordeon_mensajes">
                    Mensajes

                </h3>
                <div id="acordeon_mensajes" class="accordion-collapse collapse">
                  <div class="accordion-body " data-creat="acordeon-mensajes"></div>
                </div>
              </div>
              <div class="accordion-item">
                <h2 class="accordion-header">
                  <button class="accordion-button collapsed py-2" type="button" data-bs-toggle="collapse" data-bs-target="#acordeon_alergias" aria-expanded="false" aria-controls="acordeon_alergias">
                    Alergias
                  </button>
                </h2>
                <div id="acordeon_alergias" class="accordion-collapse collapse">
                  <div class="accordion-body py-2" data-creat="acordeon-alergias"></div>
                </div>
              </div>
          </div>

          <div class="mb-2">
              <div class="d-flex justify-content-between align-items-center">

                  <label class="form-label mb-1 text-black-50" data-dimension="dimension">Dimension</label>

              <input id="foto_titulo" type="text" class="form-control form-control-sm" data-creat="titulo" required>
          </div>

          <div class="mb-2">

            <input id="foto_slug_publico" type="text" class="form-control form-control-sm text-black-50" data-creat="slug">
          </div>

          <div class="mb-2">
            <label for="foto_mensaje_publico" class="form-label mb-1 text-black-50">Descripción (opcional)</label>
            <textarea id="foto_mensaje_publico" class="form-control form-control-sm" rows="2" data-creat="mensaje"></textarea>
          </div>

          <div class="form-check mb-2">
            <input id="foto_es_plantilla" class="form-check-input" type="checkbox" data-creat="plantilla">
            <label class="form-check-label text-black-50" for="foto_es_plantilla">Es plantilla ( Copia Única... se Replica )</label>
          </div>

          <div class="form-check mb-3">
            <input id="foto_es_publica" class="form-check-input" type="checkbox" data-creat="publica">
            <label class="form-check-label text-black-50" for="foto_es_publica">Es pública ( ⚠️ Sin Uso de Momento)</label>
          </div>

        </form>
      </div>
      <div class="modal-footer">
        <div class="d-flex gap-2 w-100">
          <button type="submit" class="btn btn-primary btn-sm w-100" data-creat="submit">Guardar</button>
        </div>        
			</div>
